<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Seen | The Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            scroll-behavior: smooth;
        }

        /* Custom shadow for that high-end Apple hardware look */
        .iphone-shadow {
            box-shadow: 0 25px 50px -12px rgba(255, 255, 255, 0.1);
        }

        /* Subtle pulsing light for the 'After' image */
        .success-glow {
            position: relative;
        }
        .success-glow::after {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <section class="min-h-screen flex flex-col items-center justify-center px-6 text-center bg-black">
        <div data-aos="fade-up" data-aos-duration="1200" data-aos-easing="ease-out-quad">
            <h2 class="text-zinc-500 text-sm md:text-base font-semibold tracking-[0.2em] uppercase mb-6">The Standard</h2>
            <h1 class="text-4xl md:text-7xl font-bold tracking-tight mb-16 max-w-4xl mx-auto">
                Get your store from <br>
                <span class="text-zinc-600">looking like this.</span>
            </h1>
            <div class="inline-block p-1 rounded-[3rem] bg-zinc-900/50 border border-white/5">
                <img src="IMG_5966.webp" alt="Before" class="w-full max-w-[320px] md:max-w-sm rounded-[2.5rem] iphone-shadow">
            </div>
        </div>
    </section>

    <section class="min-h-screen flex flex-col items-center justify-center px-6 text-center bg-black">
        <div data-aos="fade-up" data-aos-duration="1200" data-aos-delay="100">
            <h1 class="text-4xl md:text-7xl font-bold tracking-tight mb-16">
                To <span class="bg-gradient-to-b from-white to-zinc-500 bg-clip-text text-transparent">this.</span>
            </h1>
            <div class="success-glow inline-block p-1 rounded-[3rem] bg-zinc-800/30 border border-white/10">
                <img src="IMG_5963.webp" alt="After" class="w-full max-w-[320px] md:max-w-sm rounded-[2.5rem] shadow-2xl">
            </div>
        </div>
    </section>

    <section class="min-h-[80vh] flex flex-col items-center justify-center px-8 text-center bg-black">
        <div data-aos="fade-up" data-aos-duration="1500">
            <h2 class="text-3xl md:text-6xl font-semibold leading-tight max-w-5xl mx-auto text-zinc-400">
                "In a world of noise, we don't just build stores; <br> 
                <span class="text-white">we build legacies that demand to <span class="italic underline decoration-zinc-700">Be Seen.</span>"</span>
            </h2>
        </div>
    </section>

    <section class="h-screen flex flex-col items-center justify-center text-center bg-black">
        <div data-aos="zoom-out" data-aos-duration="2000" class="opacity-20">
            <h3 class="text-6xl md:text-[12rem] font-black tracking-tighter uppercase select-none">
                Coming
            </h3>
            <h3 class="text-6xl md:text-[12rem] font-black tracking-tighter uppercase select-none -mt-10 md:-mt-20">
                Soon
            </h3>
        </div>
        
        <div class="mt-12 h-12 w-[2px] bg-gradient-to-b from-white to-transparent rounded-full animate-bounce"></div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: false,
            mirror: true,
            offset: 200 // Triggers animation slightly before the element is in view for a smoother feel
        });
    </script>
</body>
</html>
