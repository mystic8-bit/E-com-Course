<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Seen | Academy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; overflow-x: hidden; margin: 0; }
        
        img { object-fit: cover; background: #111; }
        .iphone-shadow { box-shadow: 0 25px 50px -12px rgba(255, 255, 255, 0.1); }
        .apple-btn-shadow { box-shadow: 0 4px 14px 0 rgba(255, 255, 255, 0.3); transition: all 0.3s ease-out; }
        
        .course-card { transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease-out; }
        .course-card:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(255, 255, 255, 0.2); }
        
        .hidden-view { display: none !important; }
        .active-view { display: block !important; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>

    <script>
        function toggleAuthModal() {
            const modal = document.getElementById('authModal');
            modal.classList.toggle('hidden-view');
        }

        function switchView(id) {
            const views = ['landingView', 'directoryView', 'detailOne', 'detailTwo'];
            views.forEach(v => document.getElementById(v).classList.add('hidden-view'));
            document.getElementById(id).classList.remove('hidden-view');
            window.scrollTo(0,0);
            if(window.AOS) window.AOS.refresh();
        }
    </script>
</head>
<body>

    <div id="authModal" class="fixed inset-0 z-[999] flex items-center justify-center p-6 hidden-view">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" onclick="toggleAuthModal()"></div>
        <div class="relative glass w-full max-w-md rounded-[2.5rem] p-10 text-center iphone-shadow">
            <h2 id="authTitle" class="text-3xl font-bold tracking-tight mb-2">Join the Academy</h2>
            <div class="space-y-4 mt-8">
                <input type="email" id="authEmail" placeholder="Email Address" class="w-full bg-zinc-900 border border-white/10 rounded-2xl px-5 py-4 text-white">
                <input type="password" id="authPassword" placeholder="Password" class="w-full bg-zinc-900 border border-white/10 rounded-2xl px-5 py-4 text-white">
                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-white text-black font-bold rounded-2xl">Sign Up</button>
            </div>
            <p class="mt-6 text-sm text-zinc-500">
                <button onclick="toggleAuthMode()" class="text-white underline" id="authToggleBtn">Already have an account? Log In</button>
            </p>
        </div>
    </div>

    <div id="landingView">
        <nav class="fixed top-0 w-full flex justify-between items-center p-8 z-50">
            <div class="text-xl font-black tracking-tighter uppercase italic">Be Seen</div>
            <button onclick="toggleAuthModal()" class="glass px-6 py-2 rounded-full text-sm font-semibold">Log In</button>
        </nav>

        <section class="min-h-screen flex flex-col items-center justify-center px-6 text-center">
            <div data-aos="fade-up">
                <h2 class="text-zinc-500 text-sm font-bold tracking-[0.3em] mb-6 uppercase">The Standard</h2>
                <h1 class="text-4xl md:text-7xl font-extrabold tracking-tight mb-16">Get your store from <br><span class="text-zinc-600">looking like this.</span></h1>
                <img src="IMG_5966.webp" loading="lazy" class="w-full max-w-sm mx-auto rounded-[2.5rem] iphone-shadow min-h-[400px]">
            </div>
        </section>

        <section class="min-h-screen flex flex-col items-center justify-center px-6 text-center">
            <div data-aos="fade-up">
                <h1 class="text-4xl md:text-7xl font-extrabold tracking-tight mb-16">To <span class="bg-gradient-to-b from-white to-zinc-500 bg-clip-text text-transparent">this.</span></h1>
                <img src="IMG_5963.webp" loading="lazy" class="w-full max-w-sm mx-auto rounded-[2.5rem] iphone-shadow border border-white/10 min-h-[400px]">
            </div>
        </section>

        <section class="h-[60vh] flex flex-col items-center justify-center text-center">
            <div data-aos="fade-up">
                <button onclick="switchView('directoryView')" class="apple-btn-shadow px-16 py-6 bg-white text-black text-xl font-extrabold rounded-full">Enter Academy</button>
            </div>
        </section>
    </div>

    <div id="directoryView" class="hidden-view">
        <nav class="fixed top-0 left-0 p-8 z-50"><button onclick="switchView('landingView')" class="glass px-6 py-2 rounded-full text-sm">← Back</button></nav>
        <section class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
            <h1 class="text-6xl md:text-9xl font-black tracking-tighter mb-20 text-center">Academy.</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <button onclick="switchView('detailOne')" class="course-card bg-zinc-900/50 rounded-[2.5rem] overflow-hidden border border-white/5 text-left">
                    <img src="photo-1622151834677-70f982c9adef.avif" loading="lazy" class="h-56 w-full">
                    <div class="p-8"><h3 class="text-2xl font-bold">Part one | Starting • <span class="text-emerald-400">free</span></h3></div>
                </button>
                <button onclick="checkPartTwoAccess()" class="course-card bg-zinc-900/50 rounded-[2.5rem] overflow-hidden border border-white/5 text-left">
                    <img src="fulfillment.jpg" loading="lazy" class="h-56 w-full">
                    <div class="p-8"><h3 class="text-2xl font-bold">Part Two | Basics • <span class="text-blue-400">paid</span></h3></div>
                </button>
            </div>
        </section>
    </div>

    <div id="detailOne" class="hidden-view"><article class="pt-40 px-6 max-w-3xl mx-auto text-center"><h1 class="text-5xl font-black mb-12 uppercase italic">Starting Ecom.</h1><p class="text-zinc-400 text-lg">Foundation is everything. Research over revenue.</p><button onclick="switchView('directoryView')" class="mt-12 text-white underline">Back to Academy</button></article></div>
    
    <div id="detailTwo" class="hidden-view">
        <article class="pt-40 px-6 relative">
            <div id="lockOverlay" class="fixed inset-0 pt-40 bg-black/95 z-40 flex flex-col items-center justify-center text-center p-6 backdrop-blur-xl">
                <span class="text-8xl mb-8">🔒</span>
                <h2 class="text-4xl font-black mb-10 uppercase tracking-tighter">Unlock Part Two.</h2>
                <a href="https://buy.stripe.com/00w3co3lYaCE84hcbb5gc00" target="_blank" class="px-14 py-6 bg-white text-black font-extrabold rounded-full text-xl">Buy Now</a>
                <button onclick="switchView('directoryView')" class="mt-8 text-zinc-500 text-sm">Return to Academy</button>
            </div>
        </article>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const sb = window.supabase.createClient('https://wosvmiqeumkmijqydqlu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indvc3ZtaXFldW1rbWlqcXlkcWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDU4MjEsImV4cCI6MjA5MDk4MTgyMX0.32GFGZ7tgxZlJjqS2G3aSNAHuxk4QuHdcjlFrCY0I-U');

        let isLoginMode = false;
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Welcome Back' : 'Join the Academy';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Log In' : 'Sign Up';
            document.getElementById('authToggleBtn').innerText = isLoginMode ? 'Need an account? Sign Up' : 'Already have an account? Log In';
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const { data, error } = isLoginMode 
                ? await sb.auth.signInWithPassword({ email, password })
                : await sb.auth.signUp({ email, password });

            if (error) alert(error.message);
            else {
                alert(isLoginMode ? "Logged In" : "Check email!");
                toggleAuthModal();
                updateAuthUI();
            }
        }

        async function updateAuthUI() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                let { data: profile } = await sb.from('profiles').select('has_paid').eq('id', user.id).single();
                if (profile?.has_paid) document.getElementById('lockOverlay').style.display = 'none';
            }
        }

        async function checkPartTwoAccess() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { toggleAuthModal(); return; }
            switchView('detailTwo');
            updateAuthUI();
        }

        window.onload = () => { 
            AOS.init({ duration: 1000, once: true });
            updateAuthUI();
        };
    </script>
</body>
</html>
